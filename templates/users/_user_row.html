<tr id="user-row-{{ user_row.id }}">
  <td class="module-strong">{{ user_row.username }}</td>
  <td>{{ user_row.get_full_name|default:"—" }}</td>
  <td>
    {% if user_row.is_active %}
    <span class="status-pill status-active">Activo</span>
    {% else %}
    <span class="status-pill status-inactive">Inactivo</span>
    {% endif %}
  </td>
  <td>
    <div class="d-flex gap-2">
      <a href="{% url 'users:user_edit' user_row.id %}" class="btn btn-primary btn-sm">Editar</a>
      {% if not user_row.is_main_admin %}
      <form method="post" action="{% url 'users:user_toggle_active' user_row.id %}"
            hx-post="{% url 'users:user_toggle_active' user_row.id %}"
            hx-target="#user-row-{{ user_row.id }}" hx-swap="outerHTML" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-sm module-btn-secondary">{% if user_row.is_active %}Desactivar{% else %}Activar{% endif %}</button>
      </form>
      {% endif %}
    </div>
  </td>
</tr>
