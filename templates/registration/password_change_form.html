{% extends 'base.html' %}

{% block title %}Cambiar contraseña - ELYON{% endblock %}

{% block content %}
<div class="glass fade-in p-4 mx-auto text-white" style="max-width: 460px;">
  <h1 class="h4 mb-4">Cambiar contraseña</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Cambiar contraseña</button>
  </form>
</div>
{% endblock %}
