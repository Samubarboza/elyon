{% extends 'base.html' %}

{% block title %}Iniciar sesión - ELYON{% endblock %}

{% block content %}
<h1>Iniciar sesión</h1>
{% if form.errors %}
    <p>Usuario o contraseña incorrectos.</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Ingresar</button>
</form>
{% endblock %}
