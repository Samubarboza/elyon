{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ELYON{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/glass.css' %}">
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">
    <link rel="stylesheet" href="{% static 'css/toast.css' %}">
    {% block extrahead %}{% endblock %}
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    {% block navbar %}
    <nav class="navbar glass px-3 mb-4">
        <span class="navbar-brand text-white fw-semibold m-0">ELYON</span>
    </nav>
    {% endblock %}

    {% if messages %}
    <div class="toast-stack">
        {% for message in messages %}
        <div class="toast-item toast-{{ message.tags }}">
            <span>{{ message }}</span>
            <button type="button" class="toast-close" aria-label="Cerrar">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="{% block main_class %}container{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
