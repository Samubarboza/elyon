services:
    web:
      build: .
      container_name: elyon_web
      command: python manage.py runserver 0.0.0.0:8000
      volumes:
        - .:/app
      ports:
        - "8000:8000"
      env_file:
        - .env
      depends_on:
        - db
        - redis

    db:
      image: postgres:16
      container_name: elyon_db
      environment:
        POSTGRES_DB: elyon
        POSTGRES_USER: elyon
        POSTGRES_PASSWORD: elyon
      volumes:
        - postgres_data:/var/lib/postgresql/data
      ports:
        - "5432:5432"

    redis:
      image: redis:7
      container_name: elyon_redis
      ports:
        - "6379:6379"

volumes:
  postgres_data:
